<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <style>
    .light { display: inline; }
    .dark  { display: none; }
    @media (prefers-color-scheme: dark) {
      .light { display: none; }
      .dark  { display: inline; }
    }
  </style>
  <image class="light" width="64" height="64" href="data:image/png;base64,"/>
  <image class="dark"  width="64" height="64" href="data:image/png;base64,"/>
</svg>
